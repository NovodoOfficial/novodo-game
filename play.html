<!doctype html>
<html style="width: 100%; height: 100%; background-color: black">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"
    />
    <meta name="description" content="Play minecraft 1.12 in your browser" />
    <meta name="keywords" content="eaglercraft, minecraft, 1.12, 1.12.2" />
    <title>Home - Classroom</title>
    <link rel="icon" href="https://classroom.novodo.co.uk/favicon.png" />
    <script type="text/javascript" src="bootstrap.js"></script>
    <script type="text/javascript">
      "use strict";

      var unfocusedTimer = null;

      /* ---------- image visibility ---------- */

      function updateImageVisibility() {
        var container = document.getElementById("classImageContainer");
        if (!container) return;

        var windowFocused = document.hasFocus();
        var tabFocused = document.visibilityState === "visible";

        // Show image only when NOT fully focused (after delay)
        container.style.display =
          windowFocused && tabFocused ? "none" : "block";
      }

      /* ---------- focus state logic ---------- */

      function checkFocusState() {
        var windowFocused = document.hasFocus();
        var tabFocused = document.visibilityState === "visible";

        if (windowFocused && tabFocused) {
          if (unfocusedTimer !== null) {
            clearTimeout(unfocusedTimer);
            unfocusedTimer = null;
          }

          document.title = "Home - Classroom";
          updateImageVisibility();
        } else {
          if (unfocusedTimer === null) {
            unfocusedTimer = setTimeout(function () {
              document.title = "Home - Classroom";
              updateImageVisibility();
              unfocusedTimer = null;
            }, 250);
          }
        }
      }

      /* ---------- main loader ---------- */

      window.addEventListener("load", function () {
        if (window.location.href.indexOf("file:") === 0) {
          alert(
            "HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP",
          );
          return;
        }

        /* Force title + favicon */

        document.title = "Home - Classroom";

        var favicon = document.querySelector("link[rel='shortcut icon']");
        if (favicon) {
          favicon.href =
            "https://upload.wikimedia.org/wikipedia/commons/1/19/Google_Classroom_Logo.svg";
        }

        /* ---------- focus listeners ---------- */

        window.addEventListener("focus", checkFocusState);
        window.addEventListener("blur", checkFocusState);
        document.addEventListener("visibilitychange", checkFocusState);

        updateImageVisibility();

        /* ---------- launch options ---------- */

        var relayId = Math.floor(Math.random() * 3);

        window.eaglercraftXOpts = {
          demoMode: false,
          container: "game_frame",
          assetsURI: "assets.epw",
          worldsDB: "worlds",
          servers: [],
          relays: [
            {
              addr: "wss://relay.deev.is/",
              comment: "lax1dude relay #1",
              primary: relayId == 0,
            },
            {
              addr: "wss://relay.lax1dude.net/",
              comment: "lax1dude relay #2",
              primary: relayId == 1,
            },
            {
              addr: "wss://relay.shhnowisnottheti.me/",
              comment: "ayunami relay #1",
              primary: relayId == 2,
            },
          ],
        };

        var q = window.location.search;

        if (
          typeof q === "string" &&
          q[0] === "?" &&
          typeof window.URLSearchParams !== "undefined"
        ) {
          q = new window.URLSearchParams(q);
          var s = q.get("server");
          if (s) window.eaglercraftXOpts.joinServer = s;
        }

        const originalGetContext = HTMLCanvasElement.prototype.getContext;

        HTMLCanvasElement.prototype.getContext = function (type, attrs) {
          if (type === "webgl" || type === "webgl2") {
            attrs = attrs || {};
            attrs.preserveDrawingBuffer = true;
          }
          return originalGetContext.call(this, type, attrs);
        };

        main();
      });
    </script>
  </head>
  <body
    style="
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    "
  >
    <div id="screen_root" style="position: relative; width: 100%; height: 100%">
      <div
        id="game_frame"
        style="position: absolute; inset: 0; width: 100%; height: 100%"
      ></div>

      <div
        id="classImageContainer"
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: white;
          overflow-y: hidden;
          pointer-events: none;
          z-index: 9999;
          display: none;
        "
      >
        <img
          id="classImage"
          src="https://classroom.novodo.co.uk/background.png"
          style="width: 100%; height: auto; display: block; object-fit: contain"
        />
      </div>
    </div>
    <script>
      "use strict";

      const FPS = 2;
      const INTERVAL = 1000 / FPS; // 500ms
      const MAX_FRAMES = FPS * 30; // 60 frames

      let frames = [];
      let captureCanvas, ctx;
      let sourceCanvas;

      /* ---------- setup ---------- */

      function startCapture() {
        console.log("Starting frame capture...");

        sourceCanvas = document.querySelector("#game_frame canvas");

        if (!sourceCanvas) {
          console.log("Canvas not ready, retrying...");
          setTimeout(startCapture, 1000);
          return;
        }

        console.log("Canvas found");

        captureCanvas = document.createElement("canvas");
        captureCanvas.width = sourceCanvas.width;
        captureCanvas.height = sourceCanvas.height;
        ctx = captureCanvas.getContext("2d");

        setInterval(captureFrame, INTERVAL);
      }

      /* ---------- capture ---------- */

      function captureFrame() {
        try {
          // draw scaled down (this is the key line)
          ctx.drawImage(
            sourceCanvas,
            0,
            0,
            sourceCanvas.width,
            sourceCanvas.height, // source
            0,
            0,
            captureCanvas.width,
            captureCanvas.height, // scaled target
          );

          captureCanvas.toBlob(
            (blob) => {
              if (!blob) return;

              frames.push({
                blob,
                time: Date.now(),
              });

              if (frames.length > MAX_FRAMES) {
                frames.shift();
              }

              console.log("Frame:", frames.length);
            },
            "image/webp",
            0.5,
          ); // <-- also switch to webp (much smaller + faster)
        } catch (e) {
          console.error("Capture failed:", e);
        }
      }

      /* ---------- save ---------- */

      async function saveZip() {
        if (!frames.length) return;

        console.log("Saving ZIP...");

        // Load JSZip dynamically (no setup needed)
        if (!window.JSZip) {
          await loadScript(
            "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js",
          );
        }

        const zip = new JSZip();

        frames.forEach((frame, i) => {
          zip.file(`frame_${String(i).padStart(3, "0")}.png`, frame.blob);
        });

        const content = await zip.generateAsync({ type: "blob" });

        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        a.download = "clip.zip";
        a.click();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      /* ---------- helper ---------- */

      function loadScript(src) {
        return new Promise((resolve) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          document.head.appendChild(s);
        });
      }

      /* ---------- keybind ---------- */

      window.addEventListener(
        "keydown",
        (e) => {
          if (e.key === "¬" && e.shiftKey) {
            e.preventDefault();
            e.stopPropagation();

            console.log("Shift + ¬ pressed");
            saveZip();
          }
        },
        true,
      );

      /* ---------- start ---------- */

      window.addEventListener("load", () => {
        setTimeout(startCapture, 3000);
      });
    </script>
  </body>
</html>
