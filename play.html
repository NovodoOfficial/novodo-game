<!doctype html>
<html style="width: 100%; height: 100%; background-color: black">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"
    />
    <meta name="description" content="Play minecraft 1.12 in your browser" />
    <meta name="keywords" content="eaglercraft, minecraft, 1.12, 1.12.2" />
    <title>Creeper Client</title>
    <script type="text/javascript" src="bootstrap.js"></script>
    <script type="text/javascript">
      "use strict";

      // Lockdown check on page load
      window.addEventListener("load", async () => {
        try {
          const res = await fetch("https://ld.novodo.co.uk", {
            method: "GET",
            cache: "no-store"
          });
    
          // If request fails or isn't OK, do nothing
          if (!res.ok) return;
    
          // Try parsing JSON (might fail if not JSON)
          let data;
          try {
            data = await res.json();
          } catch {
            return; // Not JSON → do nothing
          }
    
          // Check lockdown flag
          if (data && data.lockdown === true) {
            window.location.href = "https://classroom.google.com";
          }
        } catch (err) {
          // Network error → do nothing
        }
      });

      /* ---------- main loader ---------- */

      window.addEventListener("load", function () {
        if (window.location.href.indexOf("file:") === 0) {
          alert(
            "HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP",
          );
          return;
        }

        /* ---------- launch options ---------- */

        var relayId = Math.floor(Math.random() * 3);

        window.eaglercraftXOpts = {
          demoMode: false,
          container: "game_frame",
          assetsURI: "assets.epw",
          worldsDB: "worlds",
          servers: [],
          relays: [
            {
              addr: "wss://relay.deev.is/",
              comment: "lax1dude relay #1",
              primary: relayId == 0,
            },
            {
              addr: "wss://relay.lax1dude.net/",
              comment: "lax1dude relay #2",
              primary: relayId == 1,
            },
            {
              addr: "wss://relay.shhnowisnottheti.me/",
              comment: "ayunami relay #1",
              primary: relayId == 2,
            },
          ],
        };

        var q = window.location.search;

        if (
          typeof q === "string" &&
          q[0] === "?" &&
          typeof window.URLSearchParams !== "undefined"
        ) {
          q = new window.URLSearchParams(q);
          var s = q.get("server");
          if (s) window.eaglercraftXOpts.joinServer = s;
        }

        main();
      });
    </script>
  </head>
  <body
    style="
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    "
  >
    <div
      id="game_frame"
      style="position: absolute; inset: 0; width: 100%; height: 100%"
    ></div>
  </body>
</html>
